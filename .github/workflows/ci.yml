name: Aegis Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Backend Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        id: backend_test
        continue-on-error: true
        run: |
          # Only run pytest if there are actual tests to run
          if [ -d "tests" ] || find . -maxdepth 2 -name "test*.py" | grep -q .; then
            pytest
          else
            echo "No tests found. Skipping pytest."
          fi
